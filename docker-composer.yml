version: '3.8'

services:
  merkadu_api:
    image: node:18-alpine
    container_name: merkadu-api
    restart: always
    working_dir: /app
    volumes:
      - ./merkadu-server:/app
    ports:
      - "3000:3000"
    # Entramos na pasta server onde está o package.json
    command: sh -c "cd apps/server && npm install && npm start"

  merkadu_web:
    image: node:18-alpine
    container_name: merkadu-web
    restart: always
    working_dir: /app
    volumes:
      - ./merkadu-server:/app
    ports:
      - "80:3000"
    # Entramos na pasta storefront para o Next.js
    command: sh -c "cd apps/storefront && npm install && npm run build && npm start"
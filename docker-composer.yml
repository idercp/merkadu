version: '3.8'

services:
  merkadu_api:
    image: node:18-alpine
    container_name: merkadu-api
    restart: always
    # Mudamos o working_dir para a raiz onde o volume mapeia
    working_dir: /app
    volumes:
      - ./merkadu-server:/app
    environment:
      - DB_HOST=${RDS_HOSTNAME}
      - DB_PORT=5432
      - DB_NAME=merkadu
      - DB_USER=postgres
      - DB_PASSWORD=${RDS_PASSWORD}
    ports:
      - "3000:3000"
    # Comando alterado para entrar na pasta certa antes de iniciar
    command: sh -c "cd apps/server && npm install && npm start"

  merkadu_web:
    image: node:18-alpine
    container_name: merkadu-web
    restart: always
    working_dir: /app
    volumes:
      - ./merkadu-server:/app
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://${EC2_PUBLIC_IP}:3000/shop-api
    command: sh -c "cd apps/storefront && npm install && npm run build && npm start"
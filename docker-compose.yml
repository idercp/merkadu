services:
  merkadu-api:
    # 1. Usa o seu Dockerfile (Node 20 + Configurações)
    build: 
      context: ./merkadu-server/apps/server
      dockerfile: ../../Dockerfile
    container_name: merkadu-api
    restart: always
    env_file: .env
    # 2. Portas padrão para a API
    ports:
      - "3000:3000"
      - "3002:3002" # Admin UI
    # 3. Executa o que já foi compilado (Muito mais rápido!)
    command: sh -c "node dist/index.js"

  merkadu-web:
    build:
      context: ./merkadu-server/apps/storefront
      dockerfile: ../../Dockerfile
      args:
        # Aumenta o limite de memória do Node durante o build para 1.5GB
        - NODE_OPTIONS=--max-old-space-size=1536
    container_name: merkadu-web
    restart: always
    env_file: .env
    ports:
      - "80:3000"
    command: sh -c "node .next/standalone/server.js"
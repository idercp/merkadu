version: '3.8'

services:
  merkadu-api:
    image: node:18-alpine
    container_name: merkadu-api
    restart: always
    working_dir: /app
    volumes:
      # Caminho absoluto para a API encontrar o código
      - /home/ec2-user/merkadu/merkadu-server:/app
    ports:
      - "3000:3000"
    command: sh -c "cd apps/server && npm install && npm run build && npm start"

  merkadu-web:
    image: node:18-alpine
    container_name: merkadu-web
    restart: always
    working_dir: /app
    volumes:
      # O mesmo caminho absoluto para o Web também encontrar o código
      - /home/ec2-user/merkadu/merkadu-server:/app
    ports:
      - "80:3000"
    command: sh -c "ls -d apps/storefront && cd apps/storefront && npm install && npm run build && npm start"
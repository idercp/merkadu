name: Deploy Merkadu to AWS

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Copiar ficheiros para EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "merkadu-server,docker-compose.yml,Dockerfile"
          target: "~/merkadu"

      - name: Executar Docker na EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 40m
          script: |
            cd ~/merkadu
            docker system prune -f
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs)
            fi
            docker-compose down
            
            docker-compose build \
              --build-arg VENDURE_SHOP_API_URL="$VENDURE_SHOP_API_URL" \
              --build-arg NEXT_PUBLIC_VENDURE_SHOP_API_URL="$NEXT_PUBLIC_VENDURE_SHOP_API_URL" \
              merkadu-api
            
            docker-compose build \
              --build-arg VENDURE_SHOP_API_URL="$VENDURE_SHOP_API_URL" \
              --build-arg NEXT_PUBLIC_VENDURE_SHOP_API_URL="$NEXT_PUBLIC_VENDURE_SHOP_API_URL" \
              merkadu-web
            
            docker-compose up -d
            docker image prune -f
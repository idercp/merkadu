name: Deploy Merkadu to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Copiar ficheiros para EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "merkadu-server,docker-compose.yml"
          target: "~/merkadu"

      - name: Executar Docker na EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 40m
          script: |
            cd ~/merkadu
            
            # 1. VITAL: Carrega as variáveis do ficheiro .env para a shell da EC2
            # Isto garante que o Docker Compose consiga ler as URLs durante o build
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs)
            fi
            
            # 2. Para os serviços para libertar memória
            docker-compose down
            
            # 3. Build sequencial passando as variáveis explicitamente como build-args
            # Isso resolve o erro de validação do Next.js (VENDURE_SHOP_API_URL not set)
            docker-compose build --build-arg VENDURE_SHOP_API_URL=$VENDURE_SHOP_API_URL --build-arg NEXT_PUBLIC_VENDURE_SHOP_API_URL=$NEXT_PUBLIC_VENDURE_SHOP_API_URL merkadu-api
            docker-compose build --build-arg VENDURE_SHOP_API_URL=$VENDURE_SHOP_API_URL --build-arg NEXT_PUBLIC_VENDURE_SHOP_API_URL=$NEXT_PUBLIC_VENDURE_SHOP_API_URL merkadu-web
            
            # 4. Sobe os serviços
            docker-compose up -d
            
            # 5. Limpeza para manter os 11GB de disco saudáveis
            docker image prune -f
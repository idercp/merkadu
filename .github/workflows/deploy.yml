name: Deploy Merkadu to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Copiar ficheiros para EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "merkadu-server,docker-compose.yml,Dockerfile"
          target: "~/merkadu"

      - name: Executar Docker na EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 40m
          script: |
            cd ~/merkadu
            
            # 1. LIMPEZA PREVENTIVA: Garante espaço para o build (Vital para t3.micro)
            # Remove contentores parados e imagens sem uso para libertar os 4.0GB de disco
            docker system prune -f
            
            # 2. Carrega as variáveis do .env real da AWS para a shell
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs)
            fi
            
            # 3. Para os serviços atuais para libertar RAM
            docker-compose down
            
            # 4. Build sequencial com injeção de argumentos
            docker-compose build \
              --build-arg VENDURE_SHOP_API_URL=$VENDURE_SHOP_API_URL \
              --build-arg NEXT_PUBLIC_VENDURE_SHOP_API_URL=$NEXT_PUBLIC_VENDURE_SHOP_API_URL \
              merkadu-api
            
            docker-compose build \
              --build-arg VENDURE_SHOP_API_URL=$VENDURE_SHOP_API_URL \
              --build-arg NEXT_PUBLIC_VENDURE_SHOP_API_URL=$NEXT_PUBLIC_VENDURE_SHOP_API_URL \
              merkadu-web
            
            # 5. Sobe os serviços em segundo plano
            docker-compose up -d
            
            # 6. Limpeza final de imagens temporárias criadas durante este build
            docker image prune -f
name: Deploy Merkadu to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Copiar ficheiros para EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Aqui enviamos a pasta do código e o docker-compose
          source: "merkadu-server,docker-compose.yml"
          target: "~/merkadu"

      - name: Executar Docker na EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/merkadu
            # Garante que o Docker usa a nova configuração
            docker-compose down
            docker-compose up -d --build